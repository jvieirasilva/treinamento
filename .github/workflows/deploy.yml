name: CI/CD - Treinamento API

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── BUILD + TEST ────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Criar application.properties para testes
        run: |
          mkdir -p src/test/resources
          cat > src/test/resources/application.properties << 'EOF'
          spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
          spring.datasource.driver-class-name=org.h2.Driver
          spring.datasource.username=sa
          spring.datasource.password=
          spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
          spring.jpa.hibernate.ddl-auto=create-drop
          spring.sql.init.mode=never
          application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
          application.security.jwt.expiration=86400000
          application.security.jwt.refresh-token.expiration=604800000
          EOF

      - name: Build com Maven
        run: mvn clean package -DskipTests

      - name: Executar testes unitários
        run: mvn test

      - name: Análise SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar -Dsonar.projectKey=jvieirasilva_treinamento -Dsonar.organization=jvieirasilva -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Upload JAR como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: treinamento-api-jar
          path: target/treinamento-api-*.jar
          retention-days: 1

  # ─── DEPLOY ──────────────────────────────────────────────────
  deploy:
    name: Deploy EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: treinamento-api-jar

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/treinamento-key.pem
          chmod 600 ~/.ssh/treinamento-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copiar JAR para EC2
        run: |
          scp -i ~/.ssh/treinamento-key.pem \
            treinamento-api-*.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/treinamento-api-0.0.1-SNAPSHOT.jar

      - name: Reiniciar serviço na EC2
        run: |
          ssh -i ~/.ssh/treinamento-key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo systemctl restart treinamento-api && sleep 10 && sudo systemctl status treinamento-api --no-pager"
